<!--
  Button – use .ds-button and .ds-button--primary | .ds-button--secondary
  A11y: use <button> for actions; [disabled] and aria-busy for loading.
  Import @ds/styles in your app so these classes are defined.
-->
<button type="button" class="ds-button ds-button--primary">
  Primary button
</button>

<button type="button" class="ds-button ds-button--secondary">
  Secondary button
</button>

<button type="button" class="ds-button ds-button--primary" disabled>
  Disabled
</button>

<button type="button" class="ds-button ds-button--primary is-loading" aria-busy="true" disabled>
  Loading
</button>
